name: ECS Deploy

on:
  workflow_run:
    workflows:
      - Container Images
    types:
      - completed
    branches:
      - deploy
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'innovatech-logistics' }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
  ECS_SERVICE_NAME: ${{ vars.ECS_SERVICE_NAME }}
  ALB_NAME: ${{ vars.ALB_NAME }}

jobs:
  deploy:
    name: Update ECS service
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read

    steps:
      - name: Resolve ECS target
        shell: bash
        run: |
          CLUSTER_NAME="${ECS_CLUSTER_NAME:-${PROJECT_NAME}-${ENVIRONMENT}-cluster}"
          SERVICE_NAME="${ECS_SERVICE_NAME:-${PROJECT_NAME}-${ENVIRONMENT}-app-service}"
          LOAD_BALANCER_NAME="${ALB_NAME:-${PROJECT_NAME}-${ENVIRONMENT}-alb}"

          echo "RESOLVED_ECS_CLUSTER_NAME=${CLUSTER_NAME}" >> "$GITHUB_ENV"
          echo "RESOLVED_ECS_SERVICE_NAME=${SERVICE_NAME}" >> "$GITHUB_ENV"
          echo "RESOLVED_ALB_NAME=${LOAD_BALANCER_NAME}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials with session token
        if: env.AWS_SESSION_TOKEN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials
        if: env.AWS_SESSION_TOKEN == ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force ECS deployment
        shell: bash
        run: |
          aws ecs update-service \
            --cluster "$RESOLVED_ECS_CLUSTER_NAME" \
            --service "$RESOLVED_ECS_SERVICE_NAME" \
            --force-new-deployment

      - name: Wait for ECS service stability
        shell: bash
        run: |
          aws ecs wait services-stable \
            --cluster "$RESOLVED_ECS_CLUSTER_NAME" \
            --services "$RESOLVED_ECS_SERVICE_NAME"

      - name: Print public endpoint
        shell: bash
        run: |
          ALB_DNS_NAME="$(aws elbv2 describe-load-balancers \
            --names "$RESOLVED_ALB_NAME" \
            --query "LoadBalancers[0].DNSName" \
            --output text)"

          echo "Application URL: http://$ALB_DNS_NAME"
