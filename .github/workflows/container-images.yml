name: Container Images

on:
  pull_request:
    branches:
      - develop
    paths:
      - "apps/**"
      - ".github/workflows/container-images.yml"
  push:
    branches:
      - develop
      - deploy
    paths:
      - "apps/**"
      - ".github/workflows/container-images.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'innovatech-logistics' }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT || 'dev' }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  PUBLISH_IMAGE: ${{ github.ref == 'refs/heads/deploy' || github.event_name == 'workflow_dispatch' }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend-despachos
            context: apps/frontend-despachos
          - service: api-despachos
            context: apps/api-despachos
          - service: api-ventas
            context: apps/api-ventas

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          REPOSITORY="${PROJECT_NAME}-${ENVIRONMENT}-${{ matrix.service }}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "repository=${REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials with session token
        if: env.PUBLISH_IMAGE == 'true' && env.AWS_SESSION_TOKEN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials
        if: env.PUBLISH_IMAGE == 'true' && env.AWS_SESSION_TOKEN == ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: env.PUBLISH_IMAGE == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        if: env.PUBLISH_IMAGE != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ steps.meta.outputs.repository }}:${{ steps.meta.outputs.short_sha }}

      - name: Build and push image to ECR
        if: env.PUBLISH_IMAGE == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ steps.meta.outputs.repository }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ steps.meta.outputs.repository }}:${{ steps.meta.outputs.short_sha }}
